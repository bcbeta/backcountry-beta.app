async function fetchNWSChartData(station) {
    const stationId = station.stationID;
    const conditions = document.getElementById('detail-conditions');
    const charts = document.getElementById('detail-charts');

    try {
        // Fetch observations from the NWS API (up to 500 recent observations ≈ 5 days hourly)
        const resp = await fetch(`https://api.weather.gov/stations/${stationId}/observations?limit=500`, {
            headers: { 'User-Agent': 'BackcountrySkiReporter', 'Accept': 'application/geo+json' }
        });
        const data = await resp.json();

        if (!data.features || data.features.length === 0) {
            charts.innerHTML = '<div style="padding:40px;text-align:center;color:#999">No observation data available</div>';
            return;
        }

        // Parse time series — NWS returns newest first, reverse for chronological
        const obs = data.features.reverse();

        const series = { temp: [], wind: [], gust: [], windDir: [], precip: [], snow: [] };

        obs.forEach(f => {
            const p = f.properties;
            const time = new Date(p.timestamp);
            if (isNaN(time.getTime())) return;

            const tempC = p.temperature?.value;
            if (tempC !== null && tempC !== undefined) {
                series.temp.push({ time, value: Math.round((tempC * 9/5 + 32) * 10) / 10 });
            }

            const windMs = p.windSpeed?.value;
            if (windMs !== null && windMs !== undefined) {
                series.wind.push({ time, value: Math.round(windMs * 2.237 * 10) / 10 });
            }

            const gustMs = p.windGust?.value;
            if (gustMs !== null && gustMs !== undefined) {
                series.gust.push({ time, value: Math.round(gustMs * 2.237 * 10) / 10 });
            }

            const windDeg = p.windDirection?.value;
            if (windDeg !== null && windDeg !== undefined) {
                series.windDir.push({ time, value: windDeg });
            }
        });

        // Current conditions from latest
        const latest = (arr) => arr.length > 0 ? arr[arr.length - 1].value : null;
        const tempNow = latest(series.temp);
        const windNow = latest(series.wind);
        const gustNow = latest(series.gust);
        const windDirNow = latest(series.windDir);

        // High/low temps (last 24h)
        let tempLow = null, tempHigh = null;
        if (series.temp.length > 0) {
            const cutoff = Date.now() - 24 * 3600000;
            const recent = series.temp.filter(p => p.time.getTime() >= cutoff);
            const vals = (recent.length > 0 ? recent : series.temp).map(p => p.value);
            tempLow = Math.min(...vals);
            tempHigh = Math.max(...vals);
        }

        // Latest observation description
        const latestObs = data.features[data.features.length - 1]?.properties;
        const description = latestObs?.textDescription || '';

        // Get latest data time
        let latestTime = null;
        if (series.temp.length > 0) {
            latestTime = series.temp[series.temp.length - 1].time;
        }

        // Build conditions header — primary row: temp, wind, gust, direction; secondary row: high/low
        let primaryHtml = '';
        if (tempNow !== null) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Temp</div><div class="detail-cond-value temp">${Math.round(tempNow)}°F</div></div>`;
        }
        if (windNow !== null) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Wind</div><div class="detail-cond-value">${Math.round(windNow)} mph</div></div>`;
        }
        if (gustNow !== null) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Gust</div><div class="detail-cond-value">${Math.round(gustNow)} mph</div></div>`;
        }
        if (windDirNow !== null) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Direction</div><div class="detail-cond-value">${degreesToCompass(windDirNow)}</div></div>`;
        }
        if (description) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Conditions</div><div class="detail-cond-value" style="font-size:13px">${description}</div></div>`;
        }

        let secondaryHtml = '';
        if (tempLow !== null) {
            secondaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Low</div><div class="detail-cond-value secondary">${Math.round(tempLow)}°F</div></div>`;
        }
        if (tempHigh !== null) {
            secondaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">High</div><div class="detail-cond-value secondary">${Math.round(tempHigh)}°F</div></div>`;
        }

        if (latestTime) {
            const timeStr = latestTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            const metaEl = document.getElementById('detail-meta');
            metaEl.textContent = metaEl.textContent + ` · Updated ${timeStr}`;
        }
        let condHtml = `<div class="detail-cond-row">${primaryHtml}</div>`;
        if (secondaryHtml) condHtml += `<div class="detail-cond-row">${secondaryHtml}</div>`;
        conditions.innerHTML = condHtml;

        // Build chart HTML
        activeCharts.forEach(c => c.destroy());
        activeCharts = [];

        let chartsHtml = '';

        if (series.temp.length > 0) {
            chartsHtml += `<div class="chart-section"><div class="chart-section-title">Temperature (°F)</div><div class="chart-container"><canvas id="chart-temp"></canvas></div></div>`;
        }
        if (series.wind.length > 0) {
            chartsHtml += `<div class="chart-section"><div class="chart-section-title">Wind (mph)</div><div class="chart-container"><canvas id="chart-wind"></canvas></div></div>`;
        }

        if (chartsHtml === '') {
            chartsHtml = '<div style="padding:40px;text-align:center;color:#999">No chart data available</div>';
        }

        charts.innerHTML = chartsHtml;

        const xAxisConfig = makeXAxisConfig();

        const chartDefaults = {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 400 },
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    titleFont: { size: 11 },
                    bodyFont: { size: 12 },
                    padding: 8,
                    cornerRadius: 6
                }
            }
        };

        // ── NWS Temperature Chart ──
        if (series.temp.length > 0) {
            const tempData = series.temp.map(p => ({ x: p.time, y: p.value }));
            const temps = series.temp.map(p => p.value);
            const minT = Math.min(...temps);
            const maxT = Math.max(...temps);
            const crossesFreezing = minT < 32 && maxT > 32;

            const dailyExtremes = findDailyExtremes(series.temp);
            const extremeIndices = new Set();
            dailyExtremes.forEach(d => { extremeIndices.add(d.highIdx); extremeIndices.add(d.lowIdx); });

            const tempDatasets = [{
                label: 'Temperature',
                data: tempData,
                borderColor: '#8b5cf6',
                backgroundColor: 'rgba(139,92,246,0.08)',
                fill: true,
                borderWidth: 2,
                pointRadius: tempData.map((_, i) => extremeIndices.has(i) ? 4 : 0),
                pointBackgroundColor: tempData.map((_, i) => extremeIndices.has(i) ? '#111' : 'transparent'),
                pointBorderColor: 'transparent',
                tension: 0.4
            }];

            if (crossesFreezing) {
                tempDatasets.push({
                    label: 'Freezing',
                    data: [{ x: tempData[0].x, y: 32 }, { x: tempData[tempData.length - 1].x, y: 32 }],
                    borderColor: 'rgba(0,0,0,0.3)',
                    borderDash: [4, 4],
                    borderWidth: 1,
                    pointRadius: 0,
                    fill: false
                });
            }

            const tempChart = new Chart(document.getElementById('chart-temp'), {
                type: 'line',
                data: { datasets: tempDatasets },
                options: {
                    ...chartDefaults,
                    scales: {
                        x: xAxisConfig,
                        y: {
                            position: 'left',
                            min: Math.floor(minT - 2),
                            max: Math.ceil(maxT + 2),
                            grid: { color: 'rgba(0,0,0,0.06)' },
                            ticks: { font: { size: 10 } }
                        }
                    },
                    plugins: {
                        ...chartDefaults.plugins,
                        tooltip: {
                            ...chartDefaults.plugins.tooltip,
                            callbacks: {
                                label: ctx => {
                                    if (ctx.dataset.label === 'Freezing') return null;
                                    return `${Math.round(ctx.parsed.y)}°F`;
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    afterDraw(chart) {
                        const ctx = chart.ctx;
                        const meta = chart.getDatasetMeta(0);
                        dailyExtremes.forEach(day => {
                            [day.highIdx, day.lowIdx].forEach(idx => {
                                if (idx >= 0 && idx < meta.data.length) {
                                    const pt = meta.data[idx];
                                    const val = `${Math.round(temps[idx])}°`;
                                    ctx.save();
                                    ctx.font = '600 10px -apple-system, sans-serif';
                                    ctx.fillStyle = '#333';
                                    ctx.textAlign = 'center';
                                    const yOff = idx === day.highIdx ? -10 : 14;
                                    ctx.fillText(val, pt.x, pt.y + yOff);
                                    ctx.restore();
                                }
                            });
                        });
                    }
                }]
            });
            activeCharts.push(tempChart);
        }

        // ── NWS Wind Chart ──
        if (series.wind.length > 0) {
            const windData = series.wind.map(p => ({ x: p.time, y: p.value }));
            const gustData = series.gust.map(p => ({ x: p.time, y: p.value }));

            const allWind = [...series.wind.map(p => p.value), ...series.gust.map(p => p.value)];
            const maxWind = Math.max(...allWind, 1);

            const windDatasets = [{
                label: 'Avg Speed',
                data: windData,
                borderColor: '#8b5cf6',
                backgroundColor: 'rgba(139,92,246,0.08)',
                fill: true,
                borderWidth: 2,
                pointRadius: 1,
                pointBackgroundColor: '#8b5cf6',
                tension: 0.4
            }];

            if (gustData.length > 0) {
                windDatasets.push({
                    label: 'Gust',
                    data: gustData,
                    borderColor: 'transparent',
                    backgroundColor: '#ef4444',
                    pointRadius: 3,
                    pointBackgroundColor: '#ef4444',
                    showLine: false
                });
            }

            const windChart = new Chart(document.getElementById('chart-wind'), {
                type: 'line',
                data: { datasets: windDatasets },
                options: {
                    ...chartDefaults,
                    plugins: {
                        ...chartDefaults.plugins,
                        legend: {
                            display: gustData.length > 0,
                            position: 'top',
                            labels: { font: { size: 10 }, boxWidth: 12, padding: 8 }
                        },
                        tooltip: {
                            ...chartDefaults.plugins.tooltip,
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ${Math.round(ctx.parsed.y)} mph`
                            }
                        }
                    },
                    scales: {
                        x: xAxisConfig,
                        y: {
                            position: 'left',
                            min: 0,
                            max: Math.ceil(maxWind * 1.15),
                            grid: { color: 'rgba(0,0,0,0.06)' },
                            ticks: { font: { size: 10 } }
                        }
                    }
                },
                plugins: [{
                    afterDraw(chart) {
                        if (series.windDir.length === 0) return;
                        const ctx = chart.ctx;
                        const xScale = chart.scales.x;
                        const yScale = chart.scales.y;
                        const speedMap = new Map();
                        series.wind.forEach(p => speedMap.set(p.time.getTime(), p.value));

                        const step = Math.max(1, Math.floor(series.windDir.length / 30));
                        series.windDir.forEach((p, i) => {
                            if (i % step !== 0) return;
                            let yVal = 0, closestDist = Infinity;
                            series.wind.forEach(sp => {
                                const dist = Math.abs(sp.time.getTime() - p.time.getTime());
                                if (dist < closestDist) { closestDist = dist; yVal = sp.value; }
                            });

                            const px = xScale.getPixelForValue(p.time);
                            const py = yScale.getPixelForValue(yVal);
                            if (px < xScale.left || px > xScale.right) return;

                            const rad = (p.value * Math.PI) / 180;
                            const arrowLen = 8;
                            ctx.save();
                            ctx.translate(px, py - 14);
                            ctx.rotate(rad);
                            ctx.beginPath();
                            ctx.moveTo(0, -arrowLen);
                            ctx.lineTo(0, arrowLen);
                            ctx.moveTo(0, -arrowLen);
                            ctx.lineTo(-3, -arrowLen + 4);
                            ctx.moveTo(0, -arrowLen);
                            ctx.lineTo(3, -arrowLen + 4);
                            ctx.strokeStyle = '#555';
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                            ctx.restore();
                        });
                    }
                }]
            });
            activeCharts.push(windChart);
        }

    } catch (err) {
        console.error('Failed to fetch NWS chart data:', err);
        charts.innerHTML = '<div style="padding:40px;text-align:center;color:#c00">Failed to load chart data</div>';
    }
}
</script>
</body>
</html>
