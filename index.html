<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backcountry Ski Reporter</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Marker Cluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        #map { width: 100vw; height: 100vh; }

        /* ── Loading overlay ── */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: #fff; font-size: 16px;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Layer control panel ── */
        .layer-control {
            position: absolute; top: 12px; right: 12px; z-index: 1000;
            background: rgba(255,255,255,0.95); border-radius: 10px;
            padding: 12px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            font-size: 13px; min-width: 200px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .layer-control h3 {
            margin: 0; font-size: 14px; color: #333;
            cursor: pointer; user-select: none;
            display: flex; align-items: center; justify-content: space-between;
        }
        .layer-control h3 .collapse-arrow {
            font-size: 10px; color: #888; transition: transform 0.2s;
        }
        .layer-control.collapsed h3 { margin-bottom: 0; border-bottom: none; }
        .layer-control.collapsed h3 .collapse-arrow { transform: rotate(-90deg); }
        .layer-control .layer-body {
            overflow: hidden; transition: max-height 0.3s ease, opacity 0.2s ease;
            max-height: 400px; opacity: 1;
            margin-top: 8px; border-top: 1px solid #ddd; padding-top: 6px;
        }
        .layer-control.collapsed .layer-body {
            max-height: 0; opacity: 0; margin-top: 0; border-top: none; padding-top: 0;
        }
        .layer-control label {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 0; cursor: pointer; color: #444;
        }
        .layer-control input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: #2563eb;
        }
        .layer-section {
            margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee;
        }
        .layer-section-title {
            font-size: 11px; font-weight: 600; color: #888;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
        }

        /* ── Observation date filter ── */
        .obs-filter {
            margin: 4px 0 2px 22px;
        }
        .obs-filter.hidden { display: none; }
        .obs-filter-presets {
            display: flex; gap: 0; border-radius: 6px; overflow: hidden;
            border: 1px solid #ddd;
        }
        .obs-filter-btn {
            padding: 3px 9px; border: none; background: #f5f5f5;
            font-size: 11px; font-weight: 500; cursor: pointer; color: #555;
            border-right: 1px solid #ddd; transition: all 0.15s;
        }
        .obs-filter-btn:last-child { border-right: none; }
        .obs-filter-btn.active { background: #2563eb; color: #fff; }
        .obs-filter-btn:hover:not(.active) { background: #e8e8e8; }
        .obs-filter-custom {
            display: flex; align-items: center; gap: 4px;
            margin-top: 4px; font-size: 11px; color: #666;
        }
        .obs-filter-custom input[type="date"] {
            font-size: 11px; padding: 2px 4px; border: 1px solid #ccc;
            border-radius: 4px; color: #333; width: 110px;
        }

        /* ── Map type buttons ── */
        .map-type-control {
            position: absolute; top: 12px; left: 60px; z-index: 1000;
            display: flex; gap: 0; border-radius: 8px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .map-type-btn {
            padding: 8px 14px; border: none; background: rgba(255,255,255,0.92);
            font-size: 12px; font-weight: 500; cursor: pointer; color: #555;
            border-right: 1px solid #ddd; transition: all 0.15s;
        }
        .map-type-btn:last-child { border-right: none; }
        .map-type-btn.active { background: #2563eb; color: #fff; }
        .map-type-btn:hover:not(.active) { background: #e8e8e8; }

        /* ── Danger legend ── */
        .danger-legend {
            position: absolute; bottom: 30px; left: 12px; z-index: 1000;
            background: rgba(255,255,255,0.95); border-radius: 10px;
            padding: 10px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            font-size: 12px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.3s ease;
        }
        .danger-legend.hidden { display: none; }
        .danger-legend h4 {
            margin: 0; font-size: 12px; color: #333;
            cursor: pointer; user-select: none;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .danger-legend h4 .collapse-arrow {
            font-size: 9px; color: #888; transition: transform 0.2s;
        }
        .danger-legend .legend-body {
            overflow: hidden; transition: max-height 0.3s ease, opacity 0.2s ease;
            max-height: 200px; opacity: 1; margin-top: 6px;
        }
        .danger-legend.collapsed .legend-body {
            max-height: 0; opacity: 0; margin-top: 0;
        }
        .danger-legend.collapsed h4 .collapse-arrow { transform: rotate(-90deg); }
        .legend-item {
            display: flex; align-items: center; gap: 6px; padding: 2px 0;
        }
        .legend-swatch {
            width: 18px; height: 14px; border-radius: 3px;
            border: 1px solid rgba(0,0,0,0.15);
        }

        /* ── Station status bar ── */
        #status-bar {
            position: absolute; bottom: 8px; right: 12px; z-index: 1000;
            background: rgba(0,0,0,0.6); color: #ccc; border-radius: 6px;
            padding: 4px 10px; font-size: 11px;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }

        /* ── Popup styles ── */
        .leaflet-popup-content-wrapper {
            border-radius: 10px !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2) !important;
        }
        .leaflet-popup-content { margin: 10px 14px !important; font-size: 13px; }

        .avy-popup { min-width: 220px; }
        .avy-popup h3 { margin: 0 0 6px 0; font-size: 15px; color: #222; }
        .avy-popup .danger-badge {
            display: inline-block; padding: 3px 10px; border-radius: 4px;
            color: #fff; font-weight: 600; font-size: 13px; margin-bottom: 6px;
        }
        .avy-popup .detail-row { color: #555; margin: 3px 0; font-size: 12px; }
        .avy-popup a { color: #2563eb; text-decoration: none; font-size: 12px; }
        .avy-popup a:hover { text-decoration: underline; }

        .station-popup { min-width: 200px; }
        .station-popup h3 { margin: 0 0 4px 0; font-size: 14px; color: #222; }
        .station-popup .station-meta { color: #888; font-size: 11px; margin-bottom: 6px; }
        .station-popup .weather-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
        }
        .station-popup .weather-item { font-size: 12px; color: #444; }
        .station-popup .weather-label { color: #888; font-size: 11px; }
        .station-popup .weather-value { font-weight: 600; font-size: 14px; }
        .station-popup .loading-data { color: #999; font-style: italic; font-size: 12px; }

        .obs-popup { min-width: 240px; max-width: 320px; }
        .obs-popup h3 { margin: 0 0 4px 0; font-size: 14px; color: #222; }
        .obs-popup .obs-meta { color: #888; font-size: 11px; margin-bottom: 6px; }
        .obs-popup .obs-description {
            font-size: 12px; color: #444; margin: 6px 0;
            max-height: 120px; overflow-y: auto;
        }
        .obs-popup a { color: #2563eb; text-decoration: none; font-size: 12px; }

        /* ── Detail panel (slide-in, resizable) ── */
        #detail-panel {
            position: fixed; top: 0; right: 0; width: 420px; min-width: 320px; max-width: 80vw;
            height: 100vh;
            background: #fff; z-index: 3000; box-shadow: -4px 0 20px rgba(0,0,0,0.25);
            transform: translateX(100%); transition: transform 0.3s ease;
            overflow-y: auto; overflow-x: hidden;
        }
        #detail-panel.open { transform: translateX(0); }
        #detail-panel.resizing { transition: none; }
        @media (max-width: 500px) {
            #detail-panel { width: 100vw; min-width: 100vw; }
        }
        .detail-resize-handle {
            position: absolute; top: 0; left: 0; width: 6px; height: 100%;
            cursor: col-resize; z-index: 10;
            background: transparent;
        }
        .detail-resize-handle:hover,
        .detail-resize-handle.active {
            background: rgba(37,99,235,0.3);
        }
        .detail-header {
            position: sticky; top: 0; background: #fff; z-index: 1;
            padding: 16px 18px 12px; border-bottom: 1px solid #eee;
        }
        .detail-header-top {
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .detail-header h2 { margin: 0; font-size: 18px; color: #111; flex: 1; }
        .detail-close-btn {
            background: none; border: none; font-size: 24px; cursor: pointer;
            color: #888; padding: 0 0 0 12px; line-height: 1;
        }
        .detail-close-btn:hover { color: #333; }
        .detail-meta { color: #888; font-size: 12px; margin-top: 2px; }
        .detail-conditions {
            margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0f0f0;
        }
        .detail-cond-row {
            display: flex; gap: 16px; flex-wrap: wrap;
        }
        .detail-cond-row + .detail-cond-row {
            margin-top: 6px; padding-top: 6px; border-top: 1px solid #f5f5f5;
        }
        .detail-cond-item { text-align: center; }
        .detail-cond-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.3px; }
        .detail-cond-value { font-size: 18px; font-weight: 700; color: #222; }
        .detail-cond-value.temp { color: #2563eb; }
        .detail-cond-value.secondary { font-size: 15px; font-weight: 600; }

        .detail-charts { padding: 12px 14px 24px; }
        .chart-section {
            background: #fffbe6; border: 1px solid #f0e6a0; border-radius: 10px;
            padding: 12px 10px; margin-bottom: 14px;
        }
        .chart-section-title {
            font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px;
        }
        .chart-container { position: relative; width: 100%; height: 180px; }
        .chart-container canvas { width: 100% !important; height: 100% !important; }

        .detail-loading {
            display: flex; align-items: center; justify-content: center;
            padding: 60px 0; color: #999; font-size: 14px; gap: 10px;
        }
        .detail-loading .spinner {
            width: 24px; height: 24px; border: 3px solid #ddd;
            border-top-color: #2563eb; margin-bottom: 0;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading avalanche zones...</div>
</div>

<div id="map"></div>

<!-- Detail panel (slide-in from right, resizable) -->
<div id="detail-panel">
    <div class="detail-resize-handle" id="detail-resize-handle"></div>
    <div class="detail-header">
        <div class="detail-header-top">
            <h2 id="detail-title">Station Name</h2>
            <button class="detail-close-btn" onclick="closeDetailPanel()">&times;</button>
        </div>
        <div class="detail-meta" id="detail-meta"></div>
        <div class="detail-conditions" id="detail-conditions"></div>
    </div>
    <div class="detail-charts" id="detail-charts">
        <div class="detail-loading">
            <div class="spinner"></div>
            Loading chart data...
        </div>
    </div>
</div>

<!-- Map type switcher -->
<div class="map-type-control">
    <button class="map-type-btn active" data-type="street">Street</button>
    <button class="map-type-btn" data-type="satellite">Satellite</button>
    <button class="map-type-btn" data-type="topo">Topo</button>
</div>

<!-- Layer toggles -->
<div class="layer-control" id="layer-control">
    <h3 onclick="document.getElementById('layer-control').classList.toggle('collapsed')">Map Layers <span class="collapse-arrow">&#9660;</span></h3>
    <div class="layer-body">
        <div class="layer-section-title">Avalanche</div>
        <label><input type="checkbox" id="toggle-avy-zones" checked> Avalanche Forecasts</label>
        <label><input type="checkbox" id="toggle-avy-obs" checked> Observations</label>
        <div class="obs-filter" id="obs-filter">
            <div class="obs-filter-presets">
                <button class="obs-filter-btn" data-range="7">Week</button>
                <button class="obs-filter-btn active" data-range="30">Month</button>
                <button class="obs-filter-btn" data-range="season">Season</button>
                <button class="obs-filter-btn" data-range="custom">Custom</button>
            </div>
            <div class="obs-filter-custom" id="obs-filter-custom" style="display:none">
                <input type="date" id="obs-date-from">
                <span>to</span>
                <input type="date" id="obs-date-to">
                <button id="obs-apply-custom" class="obs-filter-btn active" style="margin-left:2px">Go</button>
            </div>
        </div>

        <div class="layer-section">
            <div class="layer-section-title">Weather</div>
            <label><input type="checkbox" id="toggle-snotel" checked> SNOTEL Stations</label>
            <label><input type="checkbox" id="toggle-madis" checked> NWS Stations</label>
            <label><input type="checkbox" id="toggle-cocorahs"> Precipitation</label>
        </div>
    </div>
</div>

<!-- Danger legend -->
<div class="danger-legend" id="danger-legend">
    <h4 onclick="document.getElementById('danger-legend').classList.toggle('collapsed')">Avalanche Danger <span class="collapse-arrow">&#9660;</span></h4>
    <div class="legend-body">
        <div class="legend-item"><div class="legend-swatch" style="background:#cccccc"></div> No Rating</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#50b848"></div> Low</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#fff200"></div> Moderate</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#f7941e"></div> Considerable</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#ed1c24"></div> High</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#1a1a1a"></div> Extreme</div>
    </div>
</div>

<!-- Status bar -->
<div id="status-bar">Ready</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet Marker Cluster -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<!-- Parse SDK -->
<script src="https://unpkg.com/parse/dist/parse.min.js"></script>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CONFIG = {
    parse: {
        appId: 'zgqRRfY6Tr5ICfdPocRLZG8EXK59vfS5dpDM5bqr',
        jsKey: '2KBoLKZWbEnRWK3lJ70ycxTTNRYKmC01pbdqbKXK',
        serverURL: 'https://parseapi.back4app.com'
    },
    map: {
        center: [39.75, -105.99],  // Colorado
        zoom: 7
    },
    apis: {
        avyZones: 'https://api.avalanche.org/v2/public/products/map-layer',
        snotelMeta: 'https://wcc.sc.egov.usda.gov/awdbRestApi/services/v1/stations',
        snotelData: 'https://wcc.sc.egov.usda.gov/awdbRestApi/services/v1/data',
        nwsStations: 'https://api.weather.gov/stations',
        nwsObs: 'https://api.weather.gov/stations/{id}/observations',
        cocorahs: 'https://data.cocorahs.org/export/exportreports.aspx'
    }
};

// Avalanche danger colors matching the iOS app
const DANGER_COLORS = {
    0: { color: '#cccccc', label: 'No Rating' },
    1: { color: '#50b848', label: 'Low' },
    2: { color: '#fff200', label: 'Moderate' },
    3: { color: '#f7941e', label: 'Considerable' },
    4: { color: '#ed1c24', label: 'High' },
    5: { color: '#1a1a1a', label: 'Extreme' }
};

// ============================================================
// INITIALIZE PARSE
// ============================================================
Parse.initialize(CONFIG.parse.appId, CONFIG.parse.jsKey);
Parse.serverURL = CONFIG.parse.serverURL;

// ============================================================
// INITIALIZE MAP
// ============================================================
const map = L.map('map', {
    center: CONFIG.map.center,
    zoom: CONFIG.map.zoom,
    zoomControl: true
});

// Tile layers
const tileLayers = {
    street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
    }),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; Esri &mdash; Sources: Esri, DigitalGlobe, GeoEye, Earthstar, CNES/Airbus',
        maxZoom: 18
    }),
    topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenTopoMap (CC-BY-SA)',
        maxZoom: 17
    })
};

// Start with street map
tileLayers.street.addTo(map);
let activeBaseLayer = 'street';

// Map type switcher
document.querySelectorAll('.map-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        if (type === activeBaseLayer) return;
        map.removeLayer(tileLayers[activeBaseLayer]);
        tileLayers[type].addTo(map);
        activeBaseLayer = type;
        document.querySelectorAll('.map-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// ============================================================
// LAYER GROUPS
// ============================================================
const layers = {
    avyZones: L.layerGroup().addTo(map),
    avyObs: L.markerClusterGroup({
        maxClusterRadius: 40,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            return L.divIcon({
                html: `<div style="background:#e74c3c;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${count}</div>`,
                className: '', iconSize: [32, 32]
            });
        }
    }).addTo(map),
    snotel: L.markerClusterGroup({
        maxClusterRadius: 40,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            return L.divIcon({
                html: `<div style="background:#2563eb;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${count}</div>`,
                className: '', iconSize: [32, 32]
            });
        }
    }).addTo(map),
    madis: L.markerClusterGroup({
        maxClusterRadius: 40,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            return L.divIcon({
                html: `<div style="background:#8b5cf6;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${count}</div>`,
                className: '', iconSize: [32, 32]
            });
        }
    }).addTo(map),
    cocorahs: L.markerClusterGroup({
        maxClusterRadius: 40,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            return L.divIcon({
                html: `<div style="background:#059669;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${count}</div>`,
                className: '', iconSize: [32, 32]
            });
        }
    })
};

// Layer toggle handlers
document.getElementById('toggle-avy-zones').addEventListener('change', function() {
    this.checked ? map.addLayer(layers.avyZones) : map.removeLayer(layers.avyZones);
    // Show/hide the avalanche danger legend based on checkbox state
    const legend = document.getElementById('danger-legend');
    if (legend) {
        this.checked ? legend.classList.remove('hidden') : legend.classList.add('hidden');
    }
});
document.getElementById('toggle-avy-obs').addEventListener('change', function() {
    this.checked ? map.addLayer(layers.avyObs) : map.removeLayer(layers.avyObs);
    const filterEl = document.getElementById('obs-filter');
    if (filterEl) this.checked ? filterEl.classList.remove('hidden') : filterEl.classList.add('hidden');
});

// Observation date filter handlers
(function() {
    const presetBtns = document.querySelectorAll('.obs-filter-btn[data-range]');
    const customRow = document.getElementById('obs-filter-custom');
    const fromInput = document.getElementById('obs-date-from');
    const toInput = document.getElementById('obs-date-to');

    // Set default date values
    const today = new Date();
    const thirtyAgo = new Date();
    thirtyAgo.setDate(today.getDate() - 30);
    toInput.value = today.toISOString().slice(0, 10);
    fromInput.value = thirtyAgo.toISOString().slice(0, 10);

    presetBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            presetBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const range = this.dataset.range;
            obsFilterRange = range;

            if (range === 'custom') {
                customRow.style.display = 'flex';
            } else {
                customRow.style.display = 'none';
                loadAvyObservations();
            }
        });
    });

    document.getElementById('obs-apply-custom').addEventListener('click', function() {
        obsFilterRange = 'custom';
        loadAvyObservations();
    });
})();

document.getElementById('toggle-snotel').addEventListener('change', function() {
    this.checked ? map.addLayer(layers.snotel) : map.removeLayer(layers.snotel);
});
document.getElementById('toggle-madis').addEventListener('change', function() {
    this.checked ? map.addLayer(layers.madis) : map.removeLayer(layers.madis);
});
document.getElementById('toggle-cocorahs').addEventListener('change', function() {

function setStatus(text) {
    document.getElementById('status-bar').textContent = text;
}

function setLoading(show, text) {
    const overlay = document.getElementById('loading-overlay');
    if (show) {
        document.getElementById('loading-text').textContent = text || 'Loading...';
        overlay.style.display = 'flex';
    } else {
        overlay.style.display = 'none';
    }
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Find daily high/low indices in a time-value series
function findDailyExtremes(series) {
    const dayMap = {};
    series.forEach((p, i) => {
        const dayKey = p.time.toLocaleDateString('en-US');
        if (!dayMap[dayKey]) dayMap[dayKey] = { highIdx: i, lowIdx: i, highVal: p.value, lowVal: p.value };
        else {
            if (p.value > dayMap[dayKey].highVal) { dayMap[dayKey].highVal = p.value; dayMap[dayKey].highIdx = i; }
            if (p.value < dayMap[dayKey].lowVal) { dayMap[dayKey].lowVal = p.value; dayMap[dayKey].lowIdx = i; }
        }
    });
    return Object.values(dayMap);
}

// Wind direction helper
function degreesToCompass(deg) {
    if (deg === null || deg === undefined) return '—';
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
}

// SVG icon helpers
function createSvgIcon(svgContent, size, anchor) {
    return L.divIcon({
        html: svgContent,
        className: '',
        iconSize: size || [28, 28],
        iconAnchor: anchor || [14, 14]
    });
}

// Create a temperature-labeled marker icon

    const tempLabel = tempF !== null && tempF !== undefined ? `${Math.round(tempF)}°` : '—';
    const width = tempLabel.length > 3 ? 40 : 34;
    return L.divIcon({

        className: '',
        iconSize: [width, 22],
        iconAnchor: [width / 2, 11]
    });
}

// ============================================================
// LIVE TEMP AUTO-FETCH
// ============================================================
// Track which stations already have temp data fetched
const fetchedTemps = new Set();
// Map from marker._leaflet_id to station info for auto-fetch
const markerStationMap = new Map();

// Fetch temps for all visible (unclustered) markers in a layer
function fetchVisibleTemps(clusterGroup, stationType) {
    const visibleMarkers = [];
    clusterGroup.eachLayer(marker => {
        // Only process markers that are directly on the map (not inside a cluster)
        if (!marker._icon) return;
        const info = markerStationMap.get(marker._leaflet_id);
        if (!info || fetchedTemps.has(info.id)) return;
        visibleMarkers.push({ marker, info });
    });

    if (visibleMarkers.length === 0) return;
    console.log(`Auto-fetching temps for ${visibleMarkers.length} visible ${stationType} stations`);

    visibleMarkers.forEach(({ marker, info }) => {
        fetchedTemps.add(info.id);
        if (stationType === 'snotel') {
            fetchSnotelTemp(info.id, marker);
        } else if (stationType === 'madis') {
            fetchNWSTemp(info.id, marker);
        }
    });
}

// Lightweight SNOTEL temp fetch (updates icon or removes marker if no data)
async function fetchSnotelTemp(tripletID, marker) {
    try {
        const url = `${CONFIG.apis.snotelData}?stationTriplets=${encodeURIComponent(tripletID)}&elements=TOBS&duration=HOURLY&periodRef=END&centralTendencyType=NONE&returnFlags=false&returnOriginalValues=false&returnSuspectData=false`;
        const resp = await fetch(url);
        const data = await resp.json();
        let temp = null;
        if (data && data.length > 0) {
            data.forEach(datum => {
                if (!datum.data) return;
                datum.data.forEach(series => {
                    const values = series.values;
                    if (!values || values.length === 0) return;
                    for (let i = values.length - 1; i >= 0; i--) {
                        if (values[i].value !== null && values[i].value !== undefined) {
                            temp = values[i].value;
                            break;
                        }
                    }
                });
            });
        }
        if (temp !== null) {
            marker.setIcon(createTempIcon('#2563eb', temp));
        } else {
            layers.snotel.removeLayer(marker);
        }
    } catch (err) {
        // Silently fail for auto-fetch
    }
}

// Lightweight NWS temp fetch (updates icon or removes marker if no data)
async function fetchNWSTemp(stationId, marker) {
    try {
        const resp = await fetch(`https://api.weather.gov/stations/${stationId}/observations?limit=1`, {
            headers: { 'User-Agent': 'BackcountrySkiReporter', 'Accept': 'application/geo+json' }
        });
        const data = await resp.json();
        if (data.features && data.features.length > 0) {
            const tempC = data.features[0].properties.temperature?.value;
            if (tempC !== null && tempC !== undefined) {
                const tempF = Math.round(tempC * 9/5 + 32);
                marker.setIcon(createTempIcon('#8b5cf6', tempF));
                return;
            }
        }
        // No data — remove the marker
        layers.madis.removeLayer(marker);
    } catch (err) {
        // Silently fail for auto-fetch
    }
}

async function loadAvyZones() {
    setStatus('Loading avalanche zones...');
    try {
        const resp = await fetch(CONFIG.apis.avyZones);
        const data = await resp.json();

        let zoneCount = 0;
        data.features.forEach(feature => {
            const props = feature.properties;
            const danger = props.danger_level || 0;
            const dangerInfo = DANGER_COLORS[danger] || DANGER_COLORS[0];

            if (!feature.geometry || !feature.geometry.coordinates) return;

            // GeoJSON uses [lng, lat], Leaflet needs [lat, lng]
            const geoLayer = L.geoJSON(feature.geometry, {
                style: {
                    fillColor: dangerInfo.color,
                    fillOpacity: 0.35,
                    color: dangerInfo.color,
                    weight: 1.5,
                    opacity: 0.7
                }
            });

            // Popup
            const warningHtml = props.warning && props.warning.product
                ? `<div style="color:#ed1c24;font-weight:600;font-size:12px;margin-top:4px">&#x26A0; ${props.warning.product.toUpperCase()}</div>`
                : '';

            geoLayer.bindPopup(`
                <div class="avy-popup">
                    <h3>${props.name || 'Unknown Zone'}</h3>
                    <div class="danger-badge" style="background:${dangerInfo.color};${danger===2?'color:#333':''}">
                        ${dangerInfo.label} (${danger}/5)

                    ${warningHtml}
                    <div class="detail-row"><strong>Center:</strong> ${props.center || '—'}</div>
                    <div class="detail-row"><strong>Valid:</strong> ${formatDate(props.start_date)} – ${formatDate(props.end_date)}</div>
                    ${props.travel_advice ? `<div class="detail-row" style="margin-top:4px"><strong>Travel Advice:</strong> ${props.travel_advice}</div>` : ''}
                    ${props.link ? `<div style="margin-top:6px"><a href="${props.link}" target="_blank">View Full Forecast &rarr;</a></div>` : ''}
                </div>
            `, { maxWidth: 300 });

            geoLayer.addTo(layers.avyZones);
            zoneCount++;
        });

        setStatus(`${zoneCount} avalanche zones loaded`);
    } catch (err) {
        console.error('Failed to load avalanche zones:', err);
        setStatus('Error loading avalanche zones');
    }
}

async function fetchSnotelLiveData(tripletID, marker) {
    fetchedTemps.add(tripletID); // Prevent duplicate auto-fetch
    const safeId = tripletID.replace(/[^a-zA-Z0-9]/g, '_');
    const container = document.getElementById(`snotel-data-${safeId}`);
    if (!container) return;

    try {
        const url = `${CONFIG.apis.snotelData}?stationTriplets=${encodeURIComponent(tripletID)}&elements=TOBS,SNWD,WTEQ,WSPDV&duration=HOURLY&periodRef=END&centralTendencyType=NONE&returnFlags=false&returnOriginalValues=false&returnSuspectData=false`;
        const resp = await fetch(url);
        const data = await resp.json();

        let temp = null, snow = null, swe = null, wind = null;

        if (data && data.length > 0) {
            data.forEach(datum => {
                if (!datum.data) return;
                datum.data.forEach(series => {
                    const code = series.stationElement?.elementCode;
                    const values = series.values;
                    if (!values || values.length === 0) return;
                    // Get most recent non-null value
                    for (let i = values.length - 1; i >= 0; i--) {
                        if (values[i].value !== null && values[i].value !== undefined) {
                            if (code === 'TOBS') temp = values[i].value;
                            else if (code === 'SNWD') snow = values[i].value;
                            else if (code === 'WTEQ') swe = values[i].value;
                            else if (code === 'WSPDV') wind = values[i].value;
                            break;
                        }
                    }
                });
            });
        }

        // Update marker icon to show temperature
        if (temp !== null && marker) {
            marker.setIcon(createTempIcon('#2563eb', temp));
        }

        container.innerHTML = `
            <div class="weather-grid">
                <div class="weather-item">
                    <div class="weather-label">Temperature</div>
                    <div class="weather-value">${temp !== null ? temp + '&deg;F' : '—'}</div>
                </div>
                <div class="weather-item">
                    <div class="weather-label">Snow Depth</div>
                    <div class="weather-value">${snow !== null ? snow + '"' : '—'}</div>
                </div>
                <div class="weather-item">
                    <div class="weather-label">SWE</div>
                    <div class="weather-value">${swe !== null ? swe + '"' : '—'}</div>
                </div>
                <div class="weather-item">
                    <div class="weather-label">Wind</div>
                    <div class="weather-value">${wind !== null ? wind + ' mph' : '—'}</div>
                </div>
            </div>
        `;
    } catch (err) {
        container.innerHTML = '<div style="color:#c00;font-size:12px">Could not load live data</div>';
        console.error('SNOTEL data fetch error:', err);
    }
}

// ============================================================
// 5. AVALANCHE OBSERVATIONS (from Parse)
// ============================================================
let obsFilterRange = '30'; // current active filter range

function getSeasonStart() {
    const now = new Date();
    const year = now.getMonth() >= 9 ? now.getFullYear() : now.getFullYear() - 1;
    return new Date(year, 9, 1); // Oct 1
}

function getObsDateRange() {
    if (obsFilterRange === 'season') {
        return { start: getSeasonStart(), end: null };
    } else if (obsFilterRange === 'custom') {
        const fromEl = document.getElementById('obs-date-from');
        const toEl = document.getElementById('obs-date-to');
        const start = fromEl.value ? new Date(fromEl.value + 'T00:00:00') : null;
        const end = toEl.value ? new Date(toEl.value + 'T23:59:59') : null;
        return { start, end };
    } else {
        const days = parseInt(obsFilterRange) || 30;
        const start = new Date();
        start.setDate(start.getDate() - days);
        return { start, end: null };
    }
}

async function loadAvyObservations(startDate, endDate) {
    setStatus('Loading avalanche observations...');
    try {
        const PFAvyObs = Parse.Object.extend('PFAvalancheCenterObservation');
        const query = new Parse.Query(PFAvyObs);
        query.limit(5000);
        query.exists('geoPoint');
        query.include('observationPhotos');

        // Use provided dates or fall back to current filter state
        const range = (startDate !== undefined) ? { start: startDate, end: endDate || null } : getObsDateRange();
        if (range.start) query.greaterThan('observationDate', range.start);
        if (range.end) query.lessThanOrEqualTo('observationDate', range.end);
        query.descending('observationDate');

        // Clear existing observation markers before loading
        layers.avyObs.clearLayers();

        const results = await query.find();
        let count = 0;

        results.forEach(obs => {
            const geo = obs.get('geoPoint');
            if (!geo) return;

            const lat = geo.latitude;
            const lng = geo.longitude;
            const title = obs.get('title') || obs.get('forecastZone') || 'Observation';
            const desc = obs.get('observationDescription') || '';
            const detail = obs.get('observationDetail') || '';
            const dateVal = obs.get('observationDate');
            const url = obs.get('observationURL') || '';
            const zone = obs.get('forecastZone') || '';

            // Get first photo thumbnail URL if available
            const photos = obs.get('observationPhotos') || [];
            let thumbUrl = '';
            let fullUrl = '';
            if (photos.length > 0) {
                const firstPhoto = photos[0];
                if (firstPhoto && firstPhoto.get) {
                    thumbUrl = firstPhoto.get('thumbnailURL') || '';
                    fullUrl = firstPhoto.get('fullURL') || '';
                    if (!thumbUrl) thumbUrl = fullUrl;
                } else if (firstPhoto) {
                    // Fallback for plain objects (REST API response)
                    thumbUrl = firstPhoto.thumbnailURL || firstPhoto.fullURL || '';
                    fullUrl = firstPhoto.fullURL || thumbUrl;
                }
            }

            const marker = L.marker([lat, lng], { icon: ICONS.observation });

            const truncatedDesc = desc.length > 300 ? desc.substring(0, 300) + '...' : desc;

            const photoHtml = thumbUrl
                ? `<div style="margin:6px 0"><img src="${thumbUrl}" style="max-width:100%;max-height:150px;border-radius:6px;object-fit:cover;cursor:pointer" onclick="window.open('${fullUrl || thumbUrl}','_blank')" alt="Observation photo"></div>`
                : '';

            marker.bindPopup(`
                <div class="obs-popup">
                    <h3>${title}</h3>
                    <div class="obs-meta">${zone ? zone + ' &middot; ' : ''}${dateVal ? formatDate(dateVal.iso || dateVal) : ''}</div>
                    ${photoHtml}
                    ${truncatedDesc ? `<div class="obs-description">${truncatedDesc}</div>` : ''}
                    ${url ? `<div style="margin-top:6px"><a href="${url}" target="_blank">View Full Report &rarr;</a></div>` : ''}
                </div>
            `, { maxWidth: 320 });

            marker.addTo(layers.avyObs);
            count++;
        });

        setStatus(`${count} observations loaded`);
    } catch (err) {
        console.error('Failed to load avalanche observations:', err);
        setStatus('Error loading observations');
    }
}

// ============================================================
// BOOT
// ============================================================
async function init() {
    try {
        // Load static station data and avalanche zones in parallel
        await Promise.all([
            loadStationData(),
            loadAvyZones()
        ]);
        setLoading(false);

        // Create station markers from static JSON (synchronous, fast)
        loadSnotelStations();
        loadMadisStations();
        loadCoCoRaHSStations();

        // Auto-fetch temps when markers become unclustered
        const triggerAutoFetch = () => {
            fetchVisibleTemps(layers.snotel, 'snotel');
            fetchVisibleTemps(layers.madis, 'madis');
        };
        layers.snotel.on('animationend', triggerAutoFetch);
        layers.madis.on('animationend', triggerAutoFetch);
        map.on('moveend', triggerAutoFetch);
        // Initial fetch for any already-visible markers
        setTimeout(triggerAutoFetch, 500);

        // Load observations from Parse (async, needs network)
        await loadAvyObservations();

        setStatus('All layers loaded');
    } catch (err) {
        console.error('Init error:', err);
        setLoading(false);
        setStatus('Error during initialization');
    }
}

init();

let activeCharts = []; // Track active Chart.js instances for cleanup

function openDetailPanel(station) {
    const panel = document.getElementById('detail-panel');
    const title = document.getElementById('detail-title');
    const meta = document.getElementById('detail-meta');
    const conditions = document.getElementById('detail-conditions');
    const charts = document.getElementById('detail-charts');

    // Close any existing popup
    map.closePopup();

    // Destroy old charts
    activeCharts.forEach(c => c.destroy());
    activeCharts = [];

    // Set header info
    title.textContent = station.name || 'Unknown Station';

    const isMadis = station.type === 'madis';
    const stationId = isMadis ? station.stationID : station.tripletID;
    const zonePart = station.zone ? ` · ${station.zone}` : '';
    const elevPart = station.elevation ? ` · ${Math.round(station.elevation)} ft` : '';
    meta.textContent = `${stationId}${zonePart} · ${station.state || ''}${elevPart}`;

    conditions.innerHTML = '';
    charts.innerHTML = '<div class="detail-loading"><div class="spinner"></div>Loading chart data...</div>';

    // Open the panel
    panel.classList.add('open');

    // Fetch chart data based on station type
    if (isMadis) {
        fetchNWSChartData(station);
    } else {
        fetchSnotelChartData(station);
    }
}

function closeDetailPanel() {
    document.getElementById('detail-panel').classList.remove('open');
    // Destroy all active charts
    activeCharts.forEach(c => c.destroy());
    activeCharts = [];
}

// Close panel with Escape key
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetailPanel();
});

// Panel resize drag logic
(function() {
    const panel = document.getElementById('detail-panel');
    const handle = document.getElementById('detail-resize-handle');
    let dragging = false;

    handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        dragging = true;
        panel.classList.add('resizing');
        handle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const newWidth = window.innerWidth - e.clientX;
        const clamped = Math.max(320, Math.min(newWidth, window.innerWidth * 0.8));
        panel.style.width = clamped + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        panel.classList.remove('resizing');
        handle.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
})();

async function fetchSnotelChartData(station) {
    const tripletID = station.tripletID;
    const conditions = document.getElementById('detail-conditions');
    const charts = document.getElementById('detail-charts');

    try {
        // Fetch 5 days of hourly data: temperature, snow depth, SWE, wind speed, wind direction, wind gust
        const beginDate = new Date(Date.now() - 5 * 86400000);
        const endDate = new Date();
        const beginStr = beginDate.toISOString().split('T')[0];
        const endStr = endDate.toISOString().split('T')[0];

        const url = `${CONFIG.apis.snotelData}?stationTriplets=${encodeURIComponent(tripletID)}&elements=TOBS,SNWD,WTEQ,WSPDV,WDIRV,WSPDX&duration=HOURLY&beginDate=${beginStr}&endDate=${endStr}&periodRef=END&centralTendencyType=NONE&returnFlags=false&returnOriginalValues=false&returnSuspectData=false`;

        const resp = await fetch(url);
        const data = await resp.json();

        // Parse time series for each element
        const series = { TOBS: [], SNWD: [], WTEQ: [], WSPDV: [], WDIRV: [], WSPDX: [] };

        if (data && data.length > 0) {
            data.forEach(datum => {
                if (!datum.data) return;
                datum.data.forEach(s => {
                    const code = s.stationElement?.elementCode;
                    if (!code || !series[code]) return;
                    (s.values || []).forEach(v => {
                        if (v.value !== null && v.value !== undefined && v.date) {
                            series[code].push({ time: new Date(v.date), value: v.value });
                        }
                    });
                });
            });
        }

        // Compute current conditions from latest values
        const latest = (arr) => arr.length > 0 ? arr[arr.length - 1].value : null;
        const tempNow = latest(series.TOBS);
        const snowNow = latest(series.SNWD);
        const sweNow = latest(series.WTEQ);
        const windNow = latest(series.WSPDV);

        // Compute high/low temps
        let tempLow = null, tempHigh = null;
        if (series.TOBS.length > 0) {
            // Last 24 hours for high/low
            const cutoff = Date.now() - 24 * 3600000;
            const recent = series.TOBS.filter(p => p.time.getTime() >= cutoff);
            const vals = (recent.length > 0 ? recent : series.TOBS).map(p => p.value);
            tempLow = Math.min(...vals);
            tempHigh = Math.max(...vals);
        }

        // Compute new snow (change in snow depth over last 24 hours)
        let newSnow = null;
        if (series.SNWD.length > 0) {
            const cutoff24h = Date.now() - 24 * 3600000;
            const recentSnow = series.SNWD.filter(p => p.time.getTime() >= cutoff24h);
            if (recentSnow.length >= 2) {
                const snowStart = recentSnow[0].value;
                const snowEnd = recentSnow[recentSnow.length - 1].value;
                newSnow = Math.max(0, snowEnd - snowStart);
            }
        }

        // Get latest data time
        let latestTime = null;
        if (series.TOBS.length > 0) {
            latestTime = series.TOBS[series.TOBS.length - 1].time;
        }

        // Build conditions header — primary row: temp, snow, wind; secondary row: high/low
        let primaryHtml = '';
        if (tempNow !== null) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Temp</div><div class="detail-cond-value temp">${Math.round(tempNow)}°F</div></div>`;
        }
        if (snowNow !== null) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Snow Depth</div><div class="detail-cond-value">${Math.round(snowNow)}"</div></div>`;
        }
        if (newSnow !== null && newSnow > 0) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">New Snow</div><div class="detail-cond-value">${newSnow.toFixed(1)}"</div></div>`;
        }
        if (windNow !== null) {
            primaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Wind</div><div class="detail-cond-value">${Math.round(windNow)} mph</div></div>`;
        }

        let secondaryHtml = '';
        if (tempLow !== null) {
            secondaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">Low</div><div class="detail-cond-value secondary">${Math.round(tempLow)}°F</div></div>`;
        }
        if (tempHigh !== null) {
            secondaryHtml += `<div class="detail-cond-item"><div class="detail-cond-label">High</div><div class="detail-cond-value secondary">${Math.round(tempHigh)}°F</div></div>`;
        }

        if (latestTime) {
            const timeStr = latestTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            const metaEl = document.getElementById('detail-meta');
            metaEl.textContent = metaEl.textContent + ` · Updated ${timeStr}`;
        }
        let condHtml = `<div class="detail-cond-row">${primaryHtml}</div>`;
        if (secondaryHtml) condHtml += `<div class="detail-cond-row">${secondaryHtml}</div>`;
        conditions.innerHTML = condHtml;

        // Build charts
        // Destroy old charts
        activeCharts.forEach(c => c.destroy());
        activeCharts = [];

        let chartsHtml = '';

        // Temperature chart
        if (series.TOBS.length > 0) {
            chartsHtml += `<div class="chart-section"><div class="chart-section-title">Temperature (°F)</div><div class="chart-container"><canvas id="chart-temp"></canvas></div></div>`;
        }

        // Wind chart
        if (series.WSPDV.length > 0) {
            chartsHtml += `<div class="chart-section"><div class="chart-section-title">Wind (mph)</div><div class="chart-container"><canvas id="chart-wind"></canvas></div></div>`;
        }

        // Snow depth chart
        if (series.SNWD.length > 0) {
            chartsHtml += `<div class="chart-section"><div class="chart-section-title">Snow Depth (in)</div><div class="chart-container"><canvas id="chart-snow"></canvas></div></div>`;
        }

        if (chartsHtml === '') {
            chartsHtml = '<div style="padding:40px;text-align:center;color:#999">No chart data available</div>';
        }

        charts.innerHTML = chartsHtml;

        // Shared X-axis config: dates at midnight always shown, time ticks as space allows
        function makeXAxisConfig(chartEl) {
            return {
                type: 'time',
                time: {
                    unit: 'hour',
                    stepSize: 6,
                    displayFormats: { hour: 'ha', day: 'MMM d' },
                    tooltipFormat: 'MMM d, h:mm a'
                },
                afterBuildTicks(axis) {
                    // Ensure midnight ticks are always present and prioritized
                    if (!axis.ticks || axis.ticks.length === 0) return;
                    const midnightTicks = [];
                    const timeTicks = [];
                    axis.ticks.forEach(t => {
                        const d = new Date(t.value);
                        if (d.getHours() === 0) midnightTicks.push(t);
                        else timeTicks.push(t);
                    });
                    // Calculate available width per tick
                    const chartWidth = axis.chart?.width || 400;
                    const maxTicks = Math.floor(chartWidth / 38); // ~38px per tick label
                    if (axis.ticks.length > maxTicks) {
                        // Always keep midnight, then fill remaining slots with time ticks evenly
                        const timeSlots = Math.max(0, maxTicks - midnightTicks.length);
                        const step = timeSlots > 0 ? Math.max(1, Math.ceil(timeTicks.length / timeSlots)) : Infinity;
                        const kept = timeTicks.filter((_, i) => i % step === 0).slice(0, timeSlots);
                        axis.ticks = [...midnightTicks, ...kept].sort((a, b) => a.value - b.value);
                    }
                },
                grid: {
                    color: ctx => {
                        const date = new Date(ctx.tick?.value);
                        const hour = date.getHours();
                        if (hour === 0) return 'rgba(0,0,0,0.25)';
                        if (hour === 12) return 'rgba(0,0,0,0.08)';
                        return 'rgba(0,0,0,0.04)';
                    },
                    lineWidth: ctx => {
                        const date = new Date(ctx.tick?.value);
                        return date.getHours() === 0 ? 2 : 0.5;
                    }
                },
                ticks: {
                    maxRotation: 0,
                    autoSkip: false,
                    font: function(ctx) {
                        const d = new Date(ctx.tick?.value);
                        const isMidnight = d && d.getHours() === 0;
                        return { size: isMidnight ? 11 : 10, weight: isMidnight ? 'bold' : 'normal' };
                    },
                    callback: function(value) {
                        const d = new Date(value);
                        const hour = d.getHours();
                        if (hour === 0) return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        if (hour === 6 || hour === 12 || hour === 18) {
                            return d.toLocaleTimeString('en-US', { hour: 'numeric' });
                        }
                        return null;
                    }
                }
            };
        }

        const xAxisConfig = makeXAxisConfig();

        const chartDefaults = {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 400 },
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    titleFont: { size: 11 },
                    bodyFont: { size: 12 },
                    padding: 8,
                    cornerRadius: 6
                }
            }
        };

        // ── Temperature Chart ──
        if (series.TOBS.length > 0) {
            const tempData = series.TOBS.map(p => ({ x: p.time, y: p.value }));
            const temps = series.TOBS.map(p => p.value);
            const minT = Math.min(...temps);
            const maxT = Math.max(...temps);
            const crossesFreezing = minT < 32 && maxT > 32;

            // Find daily high/low indices
            const dailyExtremes = findDailyExtremes(series.TOBS);

            const extremeIndices = new Set();
            dailyExtremes.forEach(d => { extremeIndices.add(d.highIdx); extremeIndices.add(d.lowIdx); });

            const tempDatasets = [{
                label: 'Temperature',
                data: tempData,
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37,99,235,0.08)',
                fill: true,
                borderWidth: 2,
                pointRadius: tempData.map((_, i) => extremeIndices.has(i) ? 4 : 0),
                pointBackgroundColor: tempData.map((_, i) => extremeIndices.has(i) ? '#111' : 'transparent'),
                pointBorderColor: 'transparent',
                tension: 0.4
            }];

            // Freezing line
            if (crossesFreezing) {
                tempDatasets.push({
                    label: 'Freezing',
                    data: [{ x: tempData[0].x, y: 32 }, { x: tempData[tempData.length - 1].x, y: 32 }],
                    borderColor: 'rgba(0,0,0,0.3)',
                    borderDash: [4, 4],
                    borderWidth: 1,
                    pointRadius: 0,
                    fill: false
                });
            }

            const tempChart = new Chart(document.getElementById('chart-temp'), {
                type: 'line',
                data: { datasets: tempDatasets },
                options: {
                    ...chartDefaults,
                    scales: {
                        x: xAxisConfig,
                        y: {
                            position: 'left',
                            min: Math.floor(minT - 2),
                            max: Math.ceil(maxT + 2),
                            grid: { color: 'rgba(0,0,0,0.06)' },
                            ticks: { font: { size: 10 } }
                        }
                    },
                    plugins: {
                        ...chartDefaults.plugins,
                        tooltip: {
                            ...chartDefaults.plugins.tooltip,
                            callbacks: {
                                label: ctx => {
                                    if (ctx.dataset.label === 'Freezing') return null;
                                    return `${Math.round(ctx.parsed.y)}°F`;
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    afterDraw(chart) {
                        const ctx = chart.ctx;
                        const meta = chart.getDatasetMeta(0);
                        dailyExtremes.forEach(day => {
                            [day.highIdx, day.lowIdx].forEach(idx => {
                                if (idx >= 0 && idx < meta.data.length) {
                                    const pt = meta.data[idx];
                                    const val = `${Math.round(temps[idx])}°`;
                                    ctx.save();
                                    ctx.font = '600 10px -apple-system, sans-serif';
                                    ctx.fillStyle = '#333';
                                    ctx.textAlign = 'center';
                                    const yOff = idx === day.highIdx ? -10 : 14;
                                    ctx.fillText(val, pt.x, pt.y + yOff);
                                    ctx.restore();
                                }
                            });
                        });
                    }
                }]
            });
            activeCharts.push(tempChart);
        }

        // ── Wind Chart ──
        if (series.WSPDV.length > 0) {
            const windData = series.WSPDV.map(p => ({ x: p.time, y: p.value }));
            const gustData = series.WSPDX.map(p => ({ x: p.time, y: p.value }));

            const allWind = [...series.WSPDV.map(p => p.value), ...series.WSPDX.map(p => p.value)];
            const maxWind = Math.max(...allWind, 1);

            const windDatasets = [{
                label: 'Avg Speed',
                data: windData,
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37,99,235,0.08)',
                fill: true,
                borderWidth: 2,
                pointRadius: 1,
                pointBackgroundColor: '#2563eb',
                tension: 0.4
            }];

            if (gustData.length > 0) {
                windDatasets.push({
                    label: 'Gust',
                    data: gustData,
                    borderColor: 'transparent',
                    backgroundColor: '#ef4444',
                    pointRadius: 3,
                    pointBackgroundColor: '#ef4444',
                    showLine: false
                });
            }

            const windChart = new Chart(document.getElementById('chart-wind'), {
                type: 'line',
                data: { datasets: windDatasets },
                options: {
                    ...chartDefaults,
                    plugins: {
                        ...chartDefaults.plugins,
                        legend: {
                            display: gustData.length > 0,
                            position: 'top',
                            labels: { font: { size: 10 }, boxWidth: 12, padding: 8 }
                        },
                        tooltip: {
                            ...chartDefaults.plugins.tooltip,
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ${Math.round(ctx.parsed.y)} mph`
                            }
                        }
                    },
                    scales: {
                        x: xAxisConfig,
                        y: {
                            position: 'left',
                            min: 0,
                            max: Math.ceil(maxWind * 1.15),
                            grid: { color: 'rgba(0,0,0,0.06)' },
                            ticks: { font: { size: 10 } }
                        }
                    }
                },
                plugins: [{
                    // Draw wind direction arrows
                    afterDraw(chart) {
                        if (series.WDIRV.length === 0) return;
                        const ctx = chart.ctx;
                        const xScale = chart.scales.x;
                        const yScale = chart.scales.y;
                        // Map wind direction to nearest wind speed point for Y position
                        const speedMap = new Map();
                        series.WSPDV.forEach(p => speedMap.set(p.time.getTime(), p.value));

                        // Only draw every Nth arrow to avoid clutter
                        const step = Math.max(1, Math.floor(series.WDIRV.length / 30));
                        series.WDIRV.forEach((p, i) => {
                            if (i % step !== 0) return;
                            // Find closest speed value for Y position
                            let yVal = 0;
                            let closestDist = Infinity;
                            series.WSPDV.forEach(sp => {
                                const dist = Math.abs(sp.time.getTime() - p.time.getTime());
                                if (dist < closestDist) { closestDist = dist; yVal = sp.value; }
                            });

                            const px = xScale.getPixelForValue(p.time);
                            const py = yScale.getPixelForValue(yVal);
                            if (px < xScale.left || px > xScale.right) return;

                            // Draw arrow pointing in wind direction (from)
                            const rad = (p.value * Math.PI) / 180;
                            const arrowLen = 8;
                            ctx.save();
                            ctx.translate(px, py - 14);
                            ctx.rotate(rad);
                            ctx.beginPath();
                            ctx.moveTo(0, -arrowLen);
                            ctx.lineTo(0, arrowLen);
                            ctx.moveTo(0, -arrowLen);
                            ctx.lineTo(-3, -arrowLen + 4);
                            ctx.moveTo(0, -arrowLen);
                            ctx.lineTo(3, -arrowLen + 4);
                            ctx.strokeStyle = '#555';
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                            ctx.restore();
                        });
                    }
                }]
            });
            activeCharts.push(windChart);
        }

        // ── Snow Depth Chart ──
        if (series.SNWD.length > 0) {
            const snowData = series.SNWD.map(p => ({ x: p.time, y: p.value }));
            const sweData = series.WTEQ.map(p => ({ x: p.time, y: p.value }));

            const allSnow = series.SNWD.map(p => p.value);
            const minSnow = Math.min(...allSnow);
            const maxSnow = Math.max(...allSnow);

            const snowDatasets = [{
                label: 'Snow Depth',
                data: snowData,
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37,99,235,0.08)',
                fill: true,
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.3
            }];

            if (sweData.length > 0) {
                snowDatasets.push({
                    label: 'SWE',
                    data: sweData,
                    borderColor: '#059669',
                    backgroundColor: 'rgba(5,150,105,0.06)',
                    fill: true,
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                    yAxisID: 'y1'
                });
            }

            const snowChart = new Chart(document.getElementById('chart-snow'), {
                type: 'line',
                data: { datasets: snowDatasets },
                options: {
                    ...chartDefaults,
                    plugins: {
                        ...chartDefaults.plugins,
                        legend: {
                            display: sweData.length > 0,
                            position: 'top',
                            labels: { font: { size: 10 }, boxWidth: 12, padding: 8 }
                        },
                        tooltip: {
                            ...chartDefaults.plugins.tooltip,
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}"`
                            }
                        }
                    },
                    scales: {
                        x: xAxisConfig,
                        y: {
                            position: 'left',
                            min: Math.max(0, Math.floor(minSnow - 2)),
                            max: Math.ceil(maxSnow + 2),
                            grid: { color: 'rgba(0,0,0,0.06)' },
                            ticks: { font: { size: 10 } },
                            title: { display: true, text: 'Snow Depth (in)', font: { size: 10 } }
                        },
                        ...(sweData.length > 0 ? {
                            y1: {
                                position: 'right',
                                grid: { drawOnChartArea: false },
                                ticks: { font: { size: 10 } },
                                title: { display: true, text: 'SWE (in)', font: { size: 10 } }
                            }
                        } : {})
                    }
                }
            });
            activeCharts.push(snowChart);
        }

    } catch (err) {
        console.error('Failed to fetch SNOTEL chart data:', err);
        charts.innerHTML = '<div style="padding:40px;text-align:center;color:#c00">Failed to load chart data</div>';
    }
}
